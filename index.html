<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">      
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login - Administración de empresas" >
    <link href="css/intro.css" rel="stylesheet" />
    <title>Login - Administración de empresas</title>
</head>
<body>
    
    <header>
    </header>

    <main>
        <!-- Contenedor con dos partes: izquierda y derecha -->
        <div class="container-login">
            
            <!-- PARTE IZQUIERDA: TÍTULO -->
            <section class="section-left">
                <h1>Administracion de empresas</h1>
            </section>

            <!-- PARTE DERECHA: FORMULARIO -->
            <section class="section-right">
                <h2>Iniciar Sesion</h2>
                
                <!-- Formulario de login -->
                <form class="form-login">
                    
                    <!-- Campo de email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="tu@correo.com" />
                    </div>

                    <!-- Campo de contraseña -->
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Contraseña" />
                    </div>

                    <!-- Botón enviar -->
                    <button type="submit" class="btn-login">Entrar</button>

                </form>
            </section>

        </div>
    </main>

    <footer>
    </footer>

</body>
</html>
